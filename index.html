<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevStation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Figtree:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  />
</head>
<body>
  <!-- Layer 0: custom background image (behind everything) -->
  <div id="bg-image"></div>

  <!-- Layer 0b: video background -->
  <video id="bg-video" autoplay loop muted playsinline></video>

  <!-- Layer 1: animated canvas blobs -->
  <canvas id="bg-canvas"></canvas>

  <!-- Layer 2: floating widgets -->
  <main id="app"></main>

  <!-- Layer 3: settings panel + floating gear -->
  <div id="settings-root"></div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
